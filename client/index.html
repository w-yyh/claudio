<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d12;--surface:rgba(22,24,32,0.85);--border:rgba(255,255,255,0.06);
  --green:#00ff41;--green-dim:rgba(0,255,65,0.15);
  --text:#d4d4d8;--text-dim:#52525b;--text-mid:#71717a;
  --radius:14px;--mono:'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace;
}
body{
  font-family:var(--mono);background:transparent;color:var(--text);overflow:hidden;
  height:100vh;user-select:none;-webkit-app-region:no-drag;
}
#app{
  width:100%;height:100vh;background:var(--bg);border-radius:var(--radius);
  border:1px solid var(--border);display:flex;flex-direction:column;position:relative;overflow:hidden;
  box-shadow:0 0 40px rgba(100,60,255,0.08),0 0 80px rgba(0,255,65,0.03);
}
#app::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.04) 1px,transparent 1px);
  background-size:12px 12px;pointer-events:none;border-radius:var(--radius);z-index:0;
}
/* ── titlebar ── */
#titlebar{
  display:flex;justify-content:space-between;align-items:center;padding:14px 18px;z-index:10;
  -webkit-app-region:drag;position:relative;
}
#titlebar .brand{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-mid);letter-spacing:.5px}
#titlebar .brand .dot{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green),0 0 12px var(--green);animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#titlebar .actions{display:flex;gap:10px;-webkit-app-region:no-drag}
#titlebar .actions button{
  background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;
  padding:2px 6px;border-radius:4px;font-family:var(--mono);
}
#titlebar .actions button:hover{color:var(--text);background:rgba(255,255,255,0.06)}

/* ── main scroll ── */
#main{
  flex:1;overflow-y:auto;padding:8px 18px 90px;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;
}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}

/* ── clock ── */
#clock-area{
  display:flex;flex-direction:column;align-items:center;padding:20px 0 6px;position:relative;z-index:2;
}
#clock{
  font-family:'Courier New',monospace;font-size:60px;font-weight:bold;letter-spacing:6px;
  color:var(--text);line-height:1;text-shadow:0 0 20px rgba(255,255,255,0.06);
}
#date-line{font-size:12px;color:var(--text-mid);margin-top:6px;letter-spacing:1px}

/* ── ON AIR ── */
#onair{
  display:flex;align-items:center;gap:8px;justify-content:center;margin-top:8px;
  transition:opacity .3s;
}
#onair .live-dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 10px var(--green);animation:pulse 2s ease-in-out infinite;
}
#onair .live-text{font-size:11px;letter-spacing:4px;color:var(--green);font-weight:600}
#onair.off .live-dot{background:var(--text-dim);box-shadow:none;animation:none}
#onair.off .live-text{color:var(--text-dim)}

/* ── messages ── */
.msg{
  padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65;
  animation:fadeIn .3s ease;word-break:break-word;position:relative;z-index:1;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);text-align:left;max-width:85%;align-self:flex-end}
.msg.dj{background:none;border:none;color:var(--text);text-align:left;max-width:100%;align-self:flex-start}
.msg.info{background:none;color:var(--text-dim);font-size:11px;text-align:center;max-width:100%;align-self:center}

/* ── track card ── */
.track-card{
  display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  font-size:12px;align-self:stretch;z-index:1;
}
.track-card.current{border-color:var(--green);box-shadow:0 0 12px var(--green-dim),inset 0 0 12px var(--green-dim)}
.track-card .track-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.track-card .track-artist{color:var(--text-mid);font-size:11px;margin-top:2px}

/* ── player bar ── */
#player-bar{
  position:absolute;bottom:0;left:0;right:0;padding:12px 18px 16px;z-index:10;
  background:linear-gradient(transparent,var(--bg) 40%);border-radius:0 0 var(--radius) var(--radius);
}
#progress-wrap{
  width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:12px;
  cursor:pointer;position:relative;
}
#progress-fill{height:100%;background:var(--green);border-radius:2px;width:0}
#controls{display:flex;align-items:center;justify-content:space-between}
#controls .btns{display:flex;gap:14px;align-items:center}
#controls button{
  background:none;border:none;color:var(--text-mid);font-size:16px;cursor:pointer;
  padding:4px 6px;border-radius:4px;transition:color .15s;
}
#controls button:hover{color:var(--text)}
#controls button.playing{color:var(--green)}
#volume-wrap{display:flex;align-items:center;gap:6px}
#volume-wrap .vol-icon{color:var(--text-dim);font-size:13px}
#volume-slider{
  -webkit-appearance:none;appearance:none;width:60px;height:2px;
  background:rgba(255,255,255,0.12);border-radius:1px;outline:none;
}
#volume-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:var(--text);cursor:pointer;
}

/* ── input area ── */
#input-area{
  position:absolute;bottom:72px;left:18px;right:18px;display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;z-index:10;
}
#input-area input{
  flex:1;background:none;border:none;outline:none;color:var(--text);font-size:12px;
  font-family:var(--mono);caret-color:var(--green);
}
#input-area input::placeholder{color:var(--text-dim)}
#input-area button{background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer}
#input-area button:hover{color:var(--green)}

.hidden{display:none!important}

/* spinner */
.spinner{
  width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);
  border-radius:50%;animation:spin .8s linear infinite;align-self:center;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app">
  <div id="titlebar">
    <div class="brand">
      <span class="dot"></span>
      <span>Claudio</span>
    </div>
    <div class="actions">
      <button onclick="ipc('minimize')" title="Minimize">—</button>
      <button onclick="ipc('close')" title="Close">×</button>
    </div>
  </div>

  <div id="main">
    <div id="clock-area">
      <div id="clock">--:--</div>
      <div id="date-line">----.--.-- ---</div>
      <div id="onair" class="off">
        <span class="live-dot"></span>
        <span class="live-text">ON AIR</span>
      </div>
    </div>
  </div>

  <div id="input-area" class="hidden">
    <input id="msg-input" type="text" placeholder="Say something to the DJ..."
           onkeydown="if(event.key==='Enter')sendMood()">
    <button onclick="sendMood()">↑</button>
  </div>

  <div id="player-bar" class="hidden">
    <div id="progress-wrap" onmousedown="seekStart(event)">
      <div id="progress-fill"></div>
    </div>
    <div id="controls">
      <div class="btns">
        <button onclick="cmd('CMD_SKIP')" title="Skip">⏭</button>
        <button id="btn-play" onclick="togglePlay()" title="Play/Pause">▶</button>
        <button onclick="cmd('CMD_SKIP')" title="Next">⏭</button>
      </div>
      <div id="volume-wrap">
        <span class="vol-icon">♪</span>
        <input id="volume-slider" type="range" min="0" max="100" value="70"
               oninput="setVolume(this.value)">
      </div>
    </div>
  </div>
</div>

<script>
// ── IPC helper ──
function ipc(action){ if(window.electronAPI) window.electronAPI[action]() }

// ── Clock ──
(function update(){
  var n=new Date(),h=('0'+n.getHours()).slice(-2),m=('0'+n.getMinutes()).slice(-2);
  var ds=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var dd=n.getFullYear()+'.'+('0'+(n.getMonth()+1)).slice(-2)+'.'+('0'+n.getDate()).slice(-2)+' '+ds[n.getDay()];
  document.getElementById('clock').textContent=h+':'+m;
  document.getElementById('date-line').textContent=dd;
  setTimeout(update,10000);
})();

// ── WebSocket ──
var ws,st='IDLE',tid='';
(function connect(){
  ws=new WebSocket('ws://localhost:4000');
  ws.onopen=function(){
    add('info','// connected');
    document.getElementById('input-area').classList.remove('hidden');
    document.getElementById('player-bar').classList.remove('hidden');
  };
  ws.onclose=function(){ setOnAir(false); setTimeout(connect,3000); };
  ws.onmessage=function(e){ handle(JSON.parse(e.data)) };
})();

var lastCmdT=0;
function cmd(t,p){
  var now=Date.now();if(now-lastCmdT<300)return;lastCmdT=now;
  if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:t,...(p||{)}))
}

function handle(m){
  switch(m.type){
    case 'STATE_CHANGE':
      st=m.next;
      document.getElementById('btn-play').textContent=st==='PUSH'?'⏸':'▶';
      setOnAir(st==='PUSH');
      if(st==='IDLE') stopProgress();
      if(st==='PAUSE') stopProgress();
      rmSpinner();
      rmAll('.song-loading');
      break;
    case 'TRACK_UPDATE':
      rmAll('.song-loading');
      var c=m.track;
      if(c){
        var el=document.createElement('div');
        el.className='track-card current';
        el.innerHTML='<div class="track-name">'+esc(c.name)+'</div><div class="track-artist">'+esc(c.artist)+'</div>';
        document.getElementById('main').appendChild(el);
        scrollDown();
      }
      break;
    case 'DJ_SCRIPT':
      rmSpinner();
      rmOld('.song-loading');
      add('dj',m.text);
      var s=document.createElement('div');s.className='msg info song-loading';
      s.innerHTML='<div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px"></div> 正在为你挑选合适的音乐...';
      document.getElementById('main').appendChild(s);scrollDown();
      break;
    case 'PROGRESS':
      if(m.duration>0) startProgress(m.duration);
      break;
    case 'ERROR':add('info','! '+m.message);break;
  }
}
      rmAll('.song-loading');
      break;

    case 'TRACK_UPDATE':
      rmOld('#song-loading');
      var c=m.track;
      if(c){
        var el=document.createElement('div');
        el.className='track-card current';
        el.innerHTML='<div class="track-name">'+esc(c.name)+'</div><div class="track-artist">'+esc(c.artist)+'</div>';
        document.getElementById('main').appendChild(el);
        scrollDown();
      }
      break;
    case 'PROGRESS':
      if(m.duration>0) startProgress(m.duration);
      break;

    case 'STATE_CHANGE':
      st=m.next;
      document.getElementById('btn-play').textContent=st==='PUSH'?'⏸':'▶';
      setOnAir(st==='PUSH');
      if(st==='IDLE') stopProgress();
      if(st==='PAUSE') stopProgress();
      rmSpinner();
      rmOld('#song-loading');
      break;
    case 'ERROR':add('info','! '+m.message);break;
  }
}

// ── UI helpers ──
function add(type,text){
  var main=document.getElementById('main');
  var el=document.createElement('div');
  el.className='msg '+type;
  el.textContent=text;
  main.appendChild(el);
  scrollDown();
}
function scrollDown(){ var m=document.getElementById('main'); m.scrollTop=m.scrollHeight }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function rmOld(sel){ var el=document.querySelector(sel);if(el)el.remove() }
function rmAll(sel){ document.querySelectorAll(sel).forEach(function(e){e.remove()}) }
function rmSpinner(){ var s=document.getElementById('spin'); if(s)s.remove() }

function setOnAir(on){
  var el=document.getElementById('onair');
  if(el) el.className=on?'':'off';
  var cl=document.getElementById('clock-area');
  if(cl) cl.style.opacity=on?'0.3':'1';
}

// ── Progress / Seek ──
var dragging=false,durationMs=0,elapsedMs=0,progressTimer=null;

function startProgress(duration){
  durationMs=duration;elapsedMs=0;
  drawProgress();
  clearInterval(progressTimer);
  progressTimer=setInterval(function(){
    if(!dragging&&durationMs>0&&st==='PUSH'){
      elapsedMs+=1000;
      if(elapsedMs>=durationMs)elapsedMs=durationMs;
      drawProgress();
    }
  },1000);
}

function stopProgress(){
  clearInterval(progressTimer);progressTimer=null;
}

function drawProgress(){
  var f=document.getElementById('progress-fill');
  if(f&&durationMs>0) f.style.width=Math.min(100,(elapsedMs/durationMs)*100)+'%';
}

function seekStart(e){
  dragging=true;
  updateSeekPos(e);
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',seekEnd);
}

function onDrag(e){ if(dragging) updateSeekPos(e); }

function seekEnd(e){
  dragging=false;
  document.removeEventListener('mousemove',onDrag);
  document.removeEventListener('mouseup',seekEnd);
  var wrap=document.getElementById('progress-wrap');
  var rect=wrap.getBoundingClientRect();
  var pct=(e.clientX-rect.left)/rect.width;
  if(pct<0)pct=0;if(pct>1)pct=1;
  var secs=Math.floor(pct*durationMs/1000);
  elapsedMs=pct*durationMs;
  drawProgress();
  cmd('CMD_SEEK',{seconds:secs});
}

function updateSeekPos(e){
  var wrap=document.getElementById('progress-wrap');
  var rect=wrap.getBoundingClientRect();
  var pct=(e.clientX-rect.left)/rect.width;
  if(pct<0)pct=0;if(pct>1)pct=1;
  document.getElementById('progress-fill').style.width=(pct*100)+'%';
}

// ── Controls ──
function togglePlay(){
  if(st==='IDLE'||st==='PAUSE') cmd('CMD_PLAY');
  else if(st==='PUSH') cmd('CMD_PAUSE');
}
function setVolume(v){ cmd('CMD_VOLUME',{level:parseInt(v)}) }

// ── Input ──
function sendMood(){
  var inp=document.getElementById('msg-input'),mood=inp.value.trim();
  if(!mood)return;
  add('user',mood);
  cmd('CMD_MOOD',{mood:mood});
  inp.value='';
  rmSpinner();
  var s=document.createElement('div');s.className='msg info';s.id='spin';
  s.innerHTML='<div class="spinner" style="display:inline-block;vertical-align:middle;margin-right:8px"></div> Claudio 思考中...';
  document.getElementById('main').appendChild(s);scrollDown();
}
</script>
</body>
</html>
